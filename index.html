<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Adriana Queiroz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para a página de Bio */
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: #020617; /* Fundo escuro fixo */
        }
        .links-container { 
            text-align: center; 
            width: 100%; 
            max-width: 450px; 
            padding: 2rem 1.5rem; 
        }
        .profile-header { margin-bottom: 2.5rem; }
        .profile-img { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background: linear-gradient(45deg, var(--primary), #818cf8); 
            margin: 0 auto 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #020617;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
        }
        .link-item { 
            display: block; 
            background: var(--glass); 
            border: 1px solid var(--border); 
            padding: 1.2rem; 
            border-radius: 18px; 
            margin-bottom: 1.2rem; 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        .link-item:hover { 
            transform: scale(1.03); 
            border-color: var(--primary); 
            background: rgba(56, 189, 248, 0.1); 
        }
        .social-row { 
            display: flex; 
            justify-content: center; 
            gap: 1.5rem; 
            margin-top: 2rem; 
        }
        .social-row a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .social-row a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    
    <div class="links-container">
        <div class="profile-header">
            <div class="profile-img">AQ</div>
            <h2 style="margin-bottom: 0.5rem; letter-spacing: -1px;">Adriana Queiroz</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Estratégia de Conteúdo & Adm</p>
        </div>

        <div class="links-list">
            <a href="index.html" class="link-item">✨ Ver Portfólio Completo</a>
            <a href="https://wa.me/5521972362893" class="link-item">💬 Orçamentos via WhatsApp</a>
            <a href="https://www.linkedin.com/in/adriana-queirozc/" class="link-item">💼 LinkedIn Profissional</a>
            <a href="mailto:ad.queiroz.c@gmail.com" class="link-item">✉️ Enviar um E-mail</a>
        </div>

        <div class="social-row">
            <a href="#">Instagram</a>
            <a href="#">Behance</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
